<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario de clase:</title>
    <link rel="stylesheet" href="stylecss/styles.css">
</head>
<body>
    <h1>Mi Horario de Clase</h1>
    <table>
        <thead>
            <tr>
                <th>Hora</th>
                <th>Lunes</th>
                <th>Martes</th>
                <th>Miércoles</th>
                <th>Jueves</th>
                <th>Viernes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>08:00 - 08:55</td>
                <td class="fol">FOL</td>
                <td></td>
                <td class="fol">FOL</td>
                <td class="prog" rowspan="2">Progr</td>
                <td class="pax">PAX</td>
            </tr>
            <tr>
                <td>08:55 - 09:50</td>
                <td class="si" rowspan="2">SI</td>
                <td class="bbdd">BBDD</td>
                <td class="eie">EIE</td>
                <!-- jueves ya cubierto por rowspan -->
                <td class="bbdd" rowspan="2">BBDD</td>
            </tr>
            <tr>
                <td>09:50 - 10:45</td>
                <td class="fol">FOL</td>
                <td class="bbdd">BBDD</td>
                <td></td>
                <!-- viernes cubierto por rowspan -->
            </tr>
            <tr>
                <td>10:45 - 11:15</td>
                <td colspan="5" class="pati">PATI</td>
            </tr>
            <tr>
                <td>11:15 - 12:10</td>
                <td class="tut">Tutoria</td>
                <td class="bbdd">BBDD</td>
                <td class="si">SI</td>
                <td class="llm">LLM</td>
                <td class="bbdd">BBDD</td>
            </tr>
            <tr>
                <td>12:10 - 13:05</td>
                <td class="si">SI</td>
                <td class="prog" rowspan="2">Progr</td>
                <td class="llm" rowspan="2">LLM</td>
                <td class="ed" rowspan="2">ED</td>
                <td class="si" rowspan="2">SI</td>
            </tr>
            <tr>
                <td>13:05 - 14:00</td>
                <td class="eie">EIE</td>
                <!-- demás celdas cubiertas por rowspan -->
            </tr>
        </tbody>
    </table>
</body>
</html>
